
<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
            margin-top: 100px;
        }

        h1 {
            color: #0078ff;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #0078ff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello GitHub Pages!</h1>
    <p>This website is hosted for free on GitHub.</p>

    <button onclick="changeText()">
        Click Me
    </button>

    <p id="msg"></p>
</div>

<script>
function changeText() {
    document.getElementById("msg").innerHTML =
        "🎉 JavaScript is working!";
}
</script>

</body>
</html>
